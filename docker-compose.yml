version: '3.8'

x-ws-env: &ws_env
  WS_DEFAULT_URL: ${WS_DEFAULT_URL}
x-cdn-env: &cdn_env
  CDN_BASE_URL: ${CDN_BASE_URL}

services:
  client_hub:
    build:
      context: ./client-hub
      dockerfile: Dockerfile
    ports:
     - "5004:5000" # Unified Flask client hub
    labels:
      caddy: ${CLIENT_HUB_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 5000}}"
    volumes:
      - ./client-hub:/app
    environment:
      <<: [*ws_env, *cdn_env]
      DEFAULT_APP: ${DEFAULT_APP:-}
    networks:
      - proxy
  socket:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    labels:
      caddy: ${SOCKET_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 5000}}"
    ports:
      - "5003:5000" # WebSocket server (bind on all interface>
    volumes:
      - ./socket-server:/app
    environment:
      - WS_HOST=0.0.0.0
      - WS_PORT=5000
      - PYTHONUNBUFFERED=1
      - CLIENT_HUB_URL=http://client_hub:5000
    networks:
      - proxy

