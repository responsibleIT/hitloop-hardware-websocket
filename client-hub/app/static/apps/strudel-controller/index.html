<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strudel Controller</title>

    <link rel="stylesheet" href="./styles.css" />

    <script src="/static/vendor/js/HitloopDevice.js"></script>
    <script src="/static/vendor/js/HitloopDeviceManager.js"></script>
    <script src="/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webmidi@latest/dist/webmidi.iife.js"></script>

    <!-- Strudel REPL as a Web Component -->
    <script src="https://unpkg.com/@strudel/repl@1.3.0"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <button id="toggleScriptsBtn" class="btn btn--icon" title="Saved scripts">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="3" width="12" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="2" y="7" width="12" height="1.5" rx="0.75" fill="currentColor"/>
            <rect x="2" y="11" width="8" height="1.5" rx="0.75" fill="currentColor"/>
          </svg>
        </button>
        <div class="brand">
          <div class="brand__title">Strudel Controller</div>
          <div class="brand__subtitle">Device sensors → MIDI CC ch1 → Strudel</div>
        </div>
      </div>

      <div class="topbar__right">
        <label class="field">
          <span class="field__label">WebSocket URL</span>
          <input id="wsUrl" class="field__input" type="text" spellcheck="false" />
        </label>

        <div class="buttons">
          <button id="connectBtn" class="btn btn--primary">Connect</button>
          <button id="disconnectBtn" class="btn" disabled>Disconnect</button>
        </div>

        <div class="status">
          <div class="status__dot" id="statusDot" aria-hidden="true"></div>
          <div class="status__text" id="statusText">disconnected</div>
        </div>
      </div>
    </header>

    <main class="layout">
      <aside class="panel panel--scripts hidden" id="scriptsPanel">
        <div class="panel__header">
          <div class="panel__title">Scripts</div>
          <button id="closeScriptsBtn" class="btn btn--icon" title="Close">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <line x1="1" y1="1" x2="11" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="11" y1="1" x2="1" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="panel__controls">
          <div class="field field--stack">
            <label class="field__label" for="scriptNameInput">Name</label>
            <input id="scriptNameInput" class="field__input" type="text" placeholder="My script…" />
          </div>
          <button id="saveScriptBtn" class="btn btn--primary">Save current script</button>
        </div>
        <div class="script-list" id="scriptList">
          <div class="hint">No saved scripts yet.</div>
        </div>
      </aside>

      <aside class="panel panel--left">
        <div class="panel__header">
          <div class="panel__title">Devices</div>
          <div class="panel__meta" id="deviceCount">0 devices</div>
        </div>

        <div class="panel__controls">
          <div class="field field--stack">
            <label class="field__label" for="midiSelect">MIDI Output</label>
            <select id="midiSelect" class="field__input field__select">
              <option value="">— select MIDI output —</option>
            </select>
          </div>
          <div class="hint">Drag a snippet into Strudel, or click to copy.</div>
        </div>

        <div class="devices" id="devicesList">
          <div class="hint">Connect to the WebSocket server to see devices.</div>
        </div>
      </aside>

      <section class="panel panel--right">
        <div class="panel__header panel__header--tight">
          <div class="panel__title">Strudel</div>
          <div class="panel__actions">
            <button id="evalBtn" class="btn btn--primary">Play / Evaluate</button>
            <button id="stopBtn" class="btn">Stop</button>
          </div>
        </div>

        <div class="editorWrap">
          <strudel-editor id="repl">
            <!--
// All devices send on MIDI channel 1. Each device gets 3 CC numbers.
// 1st device: aX=CC1, aY=CC2, aZ=CC3
// 2nd device: aX=CC4, aY=CC5, aZ=CC6  (etc.)
// Drag a snippet from the left panel to insert it here.
// setcpm(120)
// $: s("bd sd").gain(0.9)
//
// // $: s("hh*8").lpf(cc(2).midichan(1).range(200, 8000))
// // $: s("bd sd").gain(cc(1).midichan(1).range(0.4, 1.2))
            -->
          </strudel-editor>
        </div>

        <div class="footer" id="footerMessage"></div>
      </section>
    </main>

    <script src="./midi.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
